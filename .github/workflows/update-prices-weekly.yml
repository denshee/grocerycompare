name: Weekly Grocery Price Sync

on:
  schedule:
    # 11:00 PM AWST (Perth Time) is 3:00 PM UTC. Runs Every Wednesday.
    - cron: '0 15 * * 3'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10+
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies from requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Create credentials.json
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
        
    - name: Run Woolworths Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python woolworths_to_sheets.py
      continue-on-error: true
      id: woolies

    - name: Run Coles Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python coles_to_sheets.py
      continue-on-error: true
      id: coles

    - name: Error Handling & Trigger Notifications
      if: steps.woolies.outcome == 'failure' || steps.coles.outcome == 'failure'
      run: |
        echo "🚨 CRITICAL ERROR: One or more pipelines failed during the sync process!"
        echo "- Woolworths: ${{ steps.woolies.outcome }}"
        echo "- Coles: ${{ steps.coles.outcome }}"
        echo "Failing the Github workflow deliberately to trigger the native email notification to the repository owner!"
        exit 1
