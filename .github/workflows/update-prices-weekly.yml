name: Weekly Grocery Price Sync

on:
  schedule:
    - cron: '0 15 * * 3'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4 libasound2t64

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium

    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
        
    - name: Run Woolworths Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python woolworths_to_sheets.py

    - name: Run Coles Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python coles_to_sheets.py

    - name: Run Aldi Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python aldi_full_catalog.py