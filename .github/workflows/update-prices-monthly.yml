name: Monthly Full Catalog Sync

on:
  schedule:
    # 11:00 PM AWST (Perth Time) is 3:00 PM UTC. Runs on the 1st of every month.
    - cron: '0 15 1 * *'
  workflow_dispatch:

jobs:
  full-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4 libasound2t64

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium

    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

    - name: Run Woolworths Full Catalog
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
        PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      run: python woolworths_full_catalog.py

    - name: Run Coles Full Catalog
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
        PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      run: python coles_full_catalog.py

    - name: Run Aldi Full Catalog
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
        PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
        PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      run: python aldi_full_catalog.py