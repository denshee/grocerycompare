name: Monthly Full Catalog Sync

on:
  schedule:
    # 11:00 PM AWST (Perth Time) is 3:00 PM UTC. Runs on the 1st of every month.
    - cron: '0 15 1 * *'
  workflow_dispatch:

jobs:
  # ── WOOLWORTHS SHARDED JOBS ───────────────────────────────────────────────
  woolworths-sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: ["fruit-veg", "meat-seafood", "dairy-eggs-fridge", "bakery", "deli", "pantry", "frozen-foods", "drinks", "health-beauty", "household", "baby", "pet", "international-foods", "entertaining"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
    - name: Run Woolworths Scraper
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: python woolworths_full_catalog.py --category ${{ matrix.category }}

  # ── COLES SHARDED JOBS ────────────────────────────────────────────────────
  coles-sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: ["meat-seafood", "fruit-vegetables", "dairy-eggs-fridge", "bakery", "deli", "pantry", "drinks", "frozen", "household", "health-beauty", "baby", "pet", "liquor"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
    - name: Run Coles Scraper
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: python coles_full_catalog.py --category ${{ matrix.category }}

  # ── ALDI SHARDED JOBS ─────────────────────────────────────────────────────
  aldi-sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: ["fruits-vegetables", "meat-seafood", "deli-chilled-meats", "dairy-eggs-fridge", "pantry", "bakery", "freezer", "drinks", "health-beauty", "baby", "cleaning-household", "pets", "liquor", "snacks-confectionery"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
    - name: Run Aldi Scraper
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: python aldi_full_catalog.py --category ${{ matrix.category }}
