name: Monthly Full Catalog Sync

on:
  schedule:
    # 11:00 PM AWST (Perth Time) is 3:00 PM UTC. Runs on the 1st of every month.
    - cron: '0 15 1 * *'
  workflow_dispatch:

jobs:
  update-full-catalog:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10+
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies from requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Create credentials.json
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
        
    - name: Run Woolworths Full Catalog Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python woolworths_full_catalog.py
      continue-on-error: true
      id: woolies_full

    - name: Run Coles Full Catalog Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python coles_full_catalog.py
      continue-on-error: true
      id: coles_full

    - name: Run Aldi Full Catalog Pipeline
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python aldi_full_catalog.py
      continue-on-error: true
      id: aldi_full

    - name: Error Handling & Trigger Notifications
      if: steps.woolies_full.outcome == 'failure' || steps.coles_full.outcome == 'failure' || steps.aldi_full.outcome == 'failure'
      run: |
        echo "🚨 CRITICAL ERROR: The monthly full catalog pipeline failed!"
        echo "- Woolworths Full Catalog: ${{ steps.woolies_full.outcome }}"
        echo "- Coles Full Catalog: ${{ steps.coles_full.outcome }}"
        echo "- Aldi Full Catalog: ${{ steps.aldi_full.outcome }}"
        echo "Failing the Github workflow deliberately to trigger the native email notification to the repository owner!"
        exit 1
