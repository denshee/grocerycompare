name: Best Sellers Priority Sync

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  best-sellers-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (For curl_cffi)
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        python -m playwright install --with-deps chromium
        
    - name: Create credentials.json
      run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json
        
    - name: Run Scraper
      env:
        GOOGLE_SHEET_ID: 14cci7jorS43qBbAW673-jh_394TPHeCcC4lYAOqIk0k
      run: python coles_to_sheets.py